name: Tự động Deploy lên Docker Hub

on:
  push:
    branches: [ "main" ] # Chỉ chạy khi có code đẩy lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Mượn máy ảo Ubuntu của Github để chạy

    steps:
      - name: Bước 1 - Checkout code từ Github
        uses: actions/checkout@v6.0.2

      - name: Bước 2 - Đăng nhập vào kho Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          # Đảm bảo bạn đã đặt tên 2 biến Secrets trên GitHub chính xác như thế này nhé
          username: ${{ secrets.HUYNHTHANHPHUC }}
          password: ${{ secrets.HUYNHTHANHPHUCKEY }}

      - name: Bước 3 - Đóng gói và Đẩy Image Java Backend lên Docker Hub
        uses: docker/build-push-action@v7.0.0
        with:
          context: . # Tìm Dockerfile gốc của dự án Java
          push: true
          # Đẩy lên đúng repo huynhthanhphuc/duanjava như trong hình của bạn
          tags: huynhthanhphuc/duanjava:v1, huynhthanhphuc/duanjava:latest
